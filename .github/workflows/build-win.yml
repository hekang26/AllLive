name: Build AllLive Console SelfContained
on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v4

      - name: Install .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      # 仅处理控制台项目
      - run: dotnet restore AllLive.Console/AllLive.Console.csproj
      - run: dotnet build AllLive.Console/AllLive.Console.csproj -c Release --no-restore
      # 自包含打包，内置win-x64运行库
      - run: dotnet publish AllLive.Console/AllLive.Console.csproj -c Release -r win-x64 --self-contained true --no-build

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: AllLive-Console-Win-Self
          path: AllLive.Console/bin/Release/net8.0/win-x64/publish
