name: Build AllLive Windows
on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装.NET8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      # 全局还原整个解决方案依赖
      - run: dotnet restore AllLive.sln

      # 仅编译WPF主项目AllLive
      - run: dotnet build AllLive/AllLive.csproj -c Release --no-restore

      # 只对主WPF程序打包独立运行包
      - run: dotnet publish AllLive/AllLive.csproj -c Release -r win-x64 --self-contained true --no-build

      # 上传主程序打包目录
      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: AllLive-Win-x64
          path: AllLive/bin/Release/net8.0-windows/win-x64/publish
