name: Build AllLive Windows
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      # 切换国内NuGet源，解决国外源超时
      - name: Switch NuGet mirror
        run: |
          dotnet nuget remove source nuget.org || true
          dotnet nuget add source https://nuget.cdn.azure.cn/v3/index.json --name azure
          dotnet nuget list source

      # 不带参数先还原，最简命令
      - name: Restore dependencies
        run: dotnet restore

      # 先基础编译，不打包
      - name: Build Release
        run: dotnet build -c Release

      # 打包独立程序
      - name: Publish self-contained
        run: dotnet publish -c Release --self-contained true -r win-x64

      # 上传产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AllLive-Win-x64
          path: bin/Release/*/win-x64/publish
