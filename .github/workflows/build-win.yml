name: Build AllLive Console Only
on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - run: dotnet restore AllLive.sln
      - run: dotnet build AllLive.sln -c Release --no-restore

      # 直接写完整路径发布，不切换文件夹
      - run: dotnet publish "AllLive.Console/AllLive.Console.csproj" -c Release -r win-x64 --self-contained true --no-build

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: AllLive-Console-Self
          path: AllLive.Console/bin/Release/net8.0/win-x64/publish
