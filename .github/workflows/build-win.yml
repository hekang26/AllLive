name: Build AllLive Windows
on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # 临时兼容Node20警告，避免强制切换导致异常
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v4

      - name: Install .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      # 还原依赖，不修改官方源（部分项目改镜像反而冲突）
      - run: dotnet restore

      # 基础编译，只校验代码
      - run: dotnet build -c Release --no-restore

      # 打包便携程序
      - run: dotnet publish -c Release -r win-x64 --self-contained true --no-build

      # 上传打包文件夹
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: AllLive-Win-x64
          path: bin/Release/net8.0-windows/win-x64/publish
