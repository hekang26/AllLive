name: Build AllLive Windows
on:
  push:
    branches: [ master ]
  workflow_dispatch: # 支持网页手动一键启动构建

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      # 拉取仓库源码
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 安装.NET 8编译环境
      - name: 安装.NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      # 配置国内NuGet源，解决国外包拉取超时失败
      - name: 配置国内NuGet镜像加速
        run: dotnet nuget add source https://nuget.cdn.azure.cn/v3/index.json --name AzureChina --force

      # 还原项目全部NuGet依赖
      - name: 还原项目依赖
        run: dotnet restore AllLive.sln

      # 预先编译校验代码是否存在语法错误
      - name: 预编译校验Release
        run: dotnet build AllLive.sln -c Release -p:Platform=x64

      # 打包独立运行程序（自带.NET运行库，其他电脑无需装框架）
      - name: Release完整打包
        run: dotnet publish AllLive.sln -c Release -p:RuntimeIdentifier=win-x64 -p:Platform=x64 --self-contained true

      # 上传打包好的程序为可下载压缩包
      - name: 上传编译成品包
        uses: actions/upload-artifact@v4
        with:
          name: AllLive-Win-x64
          path: '**/publish/**'
