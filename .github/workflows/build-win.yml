name: Build AllLive Windows
on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装.NET8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      # 全局还原全部项目依赖
      - run: dotnet restore AllLive.sln

      # 编译整个解决方案（所有项目正常编译，不绑定运行时）
      - run: dotnet build AllLive.sln -c Release --no-restore

      # ----------------关键改动----------------
      # 只打包WPF桌面主程序，不碰Console和Core类库
      # 先自动找到主程序csproj，这里用通配匹配WPF主项目
      - name: 仅打包桌面主程序
        run: dotnet publish *.csproj -c Release --self-contained true --no-build

      # 上传打包后的桌面程序
      - name: 上传成品压缩包
        uses: actions/upload-artifact@v4
        with:
          name: AllLive-Win-x64
          path: '**/publish/**'
